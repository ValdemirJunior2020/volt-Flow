# docker-compose.yml
services:
  voltflow-server:
    image: node:20-alpine
    working_dir: /app/server
    command: sh -c "npm install && npm run dev"
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    env_file:
      - ./server/.env

  voltflow-client:
    image: node:20-alpine
    working_dir: /app/client
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    environment:
      - VITE_API_URL=http://localhost:5000/api/v1
